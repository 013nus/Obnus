<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>我的个人网站</title>
<link rel="icon" type="image/png" sizes="32x32" href="photos/small avatar.png" />
<link rel="shortcut icon" href="photos/small avatar.png" />
<style>
  body {
    margin: 0;
    font-family: "微软雅黑", sans-serif;
    height: 100vh;
    overflow-x: hidden;
  }

  /* 顶部汉堡按钮 */
  .menu-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    font-size: 26px;
    background: none;
    border: none;
    cursor: pointer;
    z-index: 2000;
  }

  /* 侧边栏 */
  nav {
    position: fixed;
    top: 0;
    left: -220px; /* 初始隐藏 */
    width: 200px;
    height: 100%;
    background-color: #f0f0f0;
    border-right: 1px solid #ccc;
    padding: 20px;
    box-sizing: border-box;
    transition: left 0.3s ease;
    z-index: 1500;
  }
  nav.show {
    left: 0;
  }
  nav button {
    width: 100%;
    margin-bottom: 15px;
    padding: 10px;
    font-size: 16px;
    cursor: pointer;
    background-color: white;
    border: 1px solid #ddd;
    border-radius: 4px;
    transition: background-color 0.3s;
  }
  nav button:hover {
    background-color: #e0e0ff;
  }

  main {
    padding: 30px;
    box-sizing: border-box;
    transition: margin-left 0.3s ease;
  }

  body.menu-open main {
    margin-left: 220px;
  }

  .hidden {
    display: none;
  }

  h1 {
    margin-top: 0;
  }

  .center-blue-bold {
    color: #0055cc;
    font-weight: bold;
    text-align: center;
    font-size: 20px;
    margin-top: 60px;
  }

  .qrcode {
    max-width: 150px;
    margin: 10px 10px 10px 0;
    border: 1px solid #ccc;
    border-radius: 8px;
  }

  .qrcode-container {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
  }

  .works-menu {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin: 12px 0 18px;
  }

  .works-btn {
    padding: 8px 14px;
    border: 1px solid #bbb;
    border-radius: 6px;
    background: white;
    cursor: pointer;
  }

  .works-btn:hover {
    background: #eaf2ff;
  }

  .works-panel {
    border: 1px solid #d8d8d8;
    border-radius: 8px;
    background: #fff;
    padding: 14px;
  }

  #gameCanvas {
    display: block;
    width: min(100%, 800px);
    height: auto;
  }

  #introSection {
    position: relative;
    min-height: 100vh;
    overflow: hidden;
    margin: -30px;
    padding: 90px 30px 30px;
    box-sizing: border-box;
  }

  #introSection::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: url("photos/gt3rs.jpg");
    background-size: cover;
    background-position: center;
    opacity: 0.94;
    z-index: 0;
  }

  #introSection > * {
    position: relative;
    z-index: 1;
  }

  .intro-content {
    display: inline-block;
    max-width: 760px;
    background: rgba(255, 255, 255, 0.22);
    border: 1px solid rgba(255, 255, 255, 0.38);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    border-radius: 14px;
    padding: 18px 22px;
    box-shadow: 0 10px 28px rgba(9, 25, 40, 0.16);
  }

  #introSection h1 {
    margin: 0;
    font-size: clamp(36px, 5.1vw, 52px);
    line-height: 1.08;
    font-weight: 640;
    color: #102743;
    text-shadow: 0 1px 3px rgba(255, 255, 255, 0.35);
    letter-spacing: 0.2px;
  }

  #introSection p {
    margin: 14px 0 0;
    font-size: clamp(18px, 2.3vw, 24px);
    line-height: 1.55;
    color: rgba(16, 39, 67, 0.92);
    text-shadow: 0 1px 2px rgba(255, 255, 255, 0.35);
  }

  .cursor-core {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #6fd6ff;
    box-shadow: 0 0 12px rgba(84, 196, 255, 0.95);
    pointer-events: none;
    z-index: 10001;
    transform: translate(-50%, -50%);
  }

  .cursor-ring {
    position: fixed;
    width: 30px;
    height: 30px;
    border: 1.5px solid rgba(84, 196, 255, 0.85);
    border-radius: 50%;
    box-shadow: 0 0 14px rgba(84, 196, 255, 0.45);
    pointer-events: none;
    z-index: 10000;
    transform: translate(-50%, -50%);
    transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
  }

  .cursor-trail-dot {
    position: fixed;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: rgba(84, 196, 255, 0.6);
    box-shadow: 0 0 8px rgba(84, 196, 255, 0.35);
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
  }

  body.cursor-hover .cursor-ring {
    transform: translate(-50%, -50%) scale(1.5);
    border-color: rgba(145, 230, 255, 0.95);
    box-shadow: 0 0 18px rgba(145, 230, 255, 0.8);
  }

  body.cursor-pressed .cursor-ring {
    transform: translate(-50%, -50%) scale(0.86);
  }

  @media (hover: hover) and (pointer: fine) {
    body.cursor-fx-enabled,
    body.cursor-fx-enabled * {
      cursor: none !important;
    }
  }

  .music-widget {
    position: fixed;
    top: 14px;
    right: 14px;
    z-index: 2500;
  }

  .vinyl {
    position: relative;
    width: 116px;
    height: 116px;
    overflow: hidden;
    border: 2px solid #1f1f1f;
    border-radius: 50%;
    background: radial-gradient(circle at center, #232323 0 5px, #141414 5px 100%);
    box-shadow: 0 0 12px rgba(80, 175, 255, 0.35), inset 0 0 12px rgba(0, 0, 0, 0.45);
    animation: spinDisc 2.6s linear infinite;
    animation-play-state: paused;
    cursor: pointer;
  }

  .vinyl::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background:
      repeating-radial-gradient(circle at center, rgba(255, 255, 255, 0.15) 0 1px, rgba(0, 0, 0, 0.3) 1px 3px),
      conic-gradient(from 20deg, rgba(255, 255, 255, 0.22) 0deg 8deg, transparent 8deg 360deg);
    opacity: 0.9;
  }

  .vinyl::after {
    content: "";
    position: absolute;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    top: 9px;
    left: 14px;
    background: #8ee4ff;
    box-shadow: 0 0 7px rgba(142, 228, 255, 0.95);
    opacity: 0.9;
  }

  .vinyl-logo {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 64%;
    height: 64%;
    transform: translate(-50%, -50%);
    object-fit: cover;
    border-radius: 50%;
    border: 1.5px solid rgba(143, 225, 255, 0.9);
    box-shadow: 0 0 8px rgba(95, 198, 255, 0.55);
    pointer-events: none;
    z-index: 2;
  }

  .vinyl-center-hole {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 8px;
    height: 8px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: #0f0f0f;
    border: 1px solid rgba(205, 239, 255, 0.85);
    box-shadow: 0 0 4px rgba(180, 230, 255, 0.5);
    pointer-events: none;
    z-index: 3;
  }

  .vinyl.playing {
    animation-play-state: running;
  }

  @keyframes spinDisc {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .music-panel {
    position: absolute;
    right: 0;
    top: 126px;
    width: 290px;
    background: rgba(14, 20, 33, 0.92);
    color: #e8f5ff;
    border: 1px solid rgba(123, 209, 255, 0.5);
    border-radius: 10px;
    padding: 12px;
    box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
    opacity: 0;
    transform: translateY(-6px);
    pointer-events: none;
    transition: all 0.18s ease;
  }

  .music-widget:hover .music-panel {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .music-title {
    font-size: 13px;
    margin: 0 0 8px;
    line-height: 1.4;
    word-break: break-all;
  }

  .music-time {
    font-size: 12px;
    color: #9fdcff;
    margin-bottom: 10px;
  }

  .music-controls {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }

  .music-controls button,
  .music-style-select {
    border: 1px solid rgba(153, 220, 255, 0.45);
    background: rgba(255, 255, 255, 0.06);
    color: #e8f5ff;
    border-radius: 6px;
    padding: 6px 8px;
    font-size: 12px;
  }

  .music-controls button {
    cursor: pointer;
  }

  .music-style-select option {
    color: #0b223a;
    background: #f2f8ff;
  }

  .music-status {
    font-size: 11px;
    color: #cceeff;
    min-height: 14px;
  }

  .autoplay-hint {
    position: fixed;
    left: 50%;
    top: 22%;
    transform: translateX(-50%);
    z-index: 2400;
    background: rgba(10, 20, 35, 0.78);
    border: 1px solid rgba(130, 210, 255, 0.55);
    color: #e7f6ff;
    padding: 10px 14px;
    border-radius: 999px;
    font-size: 14px;
    letter-spacing: 0.2px;
    box-shadow: 0 8px 22px rgba(0, 0, 0, 0.24);
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.2s ease;
    pointer-events: none;
    white-space: nowrap;
  }

  .autoplay-hint.show {
    opacity: 1;
    visibility: visible;
  }

  @media (max-width: 768px) {
    .menu-btn {
      top: 10px;
      left: 10px;
      font-size: 28px;
    }

    nav {
      left: -84vw;
      width: 78vw;
      max-width: 290px;
      padding: 16px 14px;
    }

    body.menu-open main {
      margin-left: 0;
    }

    main {
      padding: 18px 14px 20px;
    }

    #introSection {
      margin: -18px -14px;
      min-height: 100vh;
      padding: 74px 14px 20px;
    }

    .intro-content {
      max-width: none;
      width: calc(100% - 8px);
      padding: 14px;
      border-radius: 12px;
    }

    .music-widget {
      top: 10px;
      right: 10px;
    }

    .vinyl {
      width: 76px;
      height: 76px;
    }

    .music-panel {
      top: 86px;
      width: min(88vw, 300px);
      padding: 10px;
    }

    .autoplay-hint {
      top: 18%;
      font-size: 13px;
      padding: 8px 12px;
      max-width: calc(100vw - 24px);
      white-space: normal;
      text-align: center;
    }
  }
</style>
</head>
<body>

<!-- 汉堡按钮 -->
<button class="menu-btn" onclick="toggleMenu()">☰</button>

<!-- 侧边栏 -->

<div class="music-widget" id="musicWidget">

<!-- 主体 -->

<script>
  function toggleMenu() {
    const isShown = document.getElementById('sidebar').classList.toggle('show');
    document.body.classList.toggle('menu-open', isShown);
  }

  function showSection(id) {
    document.querySelectorAll('main section').forEach(sec => {
      sec.classList.add('hidden');
    });
    document.getElementById(id).classList.remove('hidden');
    if (id === 'myWorksSection') {
      openWork('home');
    }
    toggleMenu(); // 切换完自动收起菜单
  }

  function openWork(workKey) {
    const panelMap = {
      home: 'worksHomePanel',
      airWar: 'airWarPanel',
      // 未来新增项目：project2: 'project2Panel'
      project2: 'project2Panel'
    };

    Object.values(panelMap).forEach(panelId => {
      const panel = document.getElementById(panelId);
      if (panel) panel.classList.add('hidden');
    });

    const targetId = panelMap[workKey] || panelMap.home;
    document.getElementById(targetId).classList.remove('hidden');
  }

  function initCursorTrail() {
    const canUseCustomCursor = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
    if (!canUseCustomCursor) return;

    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const dotCount = prefersReducedMotion ? 5 : 10;
    const dots = [];
    let mouseXGlobal = window.innerWidth / 2;
    let mouseYGlobal = window.innerHeight / 2;
    let ringX = mouseXGlobal;
    let ringY = mouseYGlobal;

    document.body.classList.add('cursor-fx-enabled');

    const core = document.createElement('div');
    core.className = 'cursor-core';
    document.body.appendChild(core);

    const ring = document.createElement('div');
    ring.className = 'cursor-ring';
    document.body.appendChild(ring);

    for (let i = 0; i < dotCount; i++) {
      const dot = document.createElement('div');
      dot.className = 'cursor-trail-dot';
      dot.style.width = `${9 - i * 0.45}px`;
      dot.style.height = `${9 - i * 0.45}px`;
      dot.style.opacity = `${0.9 - i * 0.07}`;
      document.body.appendChild(dot);
      dots.push({
        el: dot,
        x: mouseXGlobal,
        y: mouseYGlobal
      });
    }

    window.addEventListener('mousemove', e => {
      mouseXGlobal = e.clientX;
      mouseYGlobal = e.clientY;
    });

    document.addEventListener('mouseover', e => {
      const target = e.target.closest('a, button, [role="button"], input, textarea, select, label, canvas');
      document.body.classList.toggle('cursor-hover', !!target);
    });

    window.addEventListener('mousedown', () => {
      document.body.classList.add('cursor-pressed');
    });

    window.addEventListener('mouseup', () => {
      document.body.classList.remove('cursor-pressed');
    });

    function animateTrail() {
      let x = mouseXGlobal;
      let y = mouseYGlobal;

      core.style.left = `${mouseXGlobal}px`;
      core.style.top = `${mouseYGlobal}px`;

      const ringEase = prefersReducedMotion ? 0.38 : 0.22;
      ringX += (mouseXGlobal - ringX) * ringEase;
      ringY += (mouseYGlobal - ringY) * ringEase;
      ring.style.left = `${ringX}px`;
      ring.style.top = `${ringY}px`;

      dots.forEach(dot => {
        dot.x += (x - dot.x) * 0.32;
        dot.y += (y - dot.y) * 0.32;
        dot.el.style.left = `${dot.x}px`;
        dot.el.style.top = `${dot.y}px`;
        x = dot.x;
        y = dot.y;
      });

      requestAnimationFrame(animateTrail);
    }

    animateTrail();
  }

  const MUSIC_LIBRARY = {
    'drum and bass': [
      'music/drum and bass/haltija.mp3'
    ],
    'jazz hiphop': [
      'music/jazz hiphop/Autumn Leaf-Re：Plus.mp3',
      'music/jazz hiphop/nighttime replus.mp3'
    ],
    '陈绮贞': [
      'music/陈绮贞/after17.mp3',
      'music/陈绮贞/self.mp3',
      'music/陈绮贞/九份的咖啡店.mp3',
      'music/陈绮贞/台北某个地方.mp3',
      'music/陈绮贞/吉他手.mp3',
      'music/陈绮贞/告诉我.mp3',
      'music/陈绮贞/太多.mp3',
      'music/陈绮贞/太聪明.mp3',
      'music/陈绮贞/小尘埃.mp3',
      'music/陈绮贞/小步舞曲.mp3',
      'music/陈绮贞/旅行的意义.mp3',
      'music/陈绮贞/躺在你的衣柜.mp3',
      'music/陈绮贞/还是会寂寞.mp3',
      'music/陈绮贞/陈绮贞 - 雨水一盒.mp3',
      'music/陈绮贞/鱼.aac'
    ]
  };

  function initMusicPlayer() {
    const audio = new Audio();
    audio.preload = 'metadata';

    const disc = document.getElementById('vinylDisc');
    const titleEl = document.getElementById('musicTitle');
    const timeEl = document.getElementById('musicTime');
    const statusEl = document.getElementById('musicStatus');
    const prevBtn = document.getElementById('prevTrackBtn');
    const nextBtn = document.getElementById('nextTrackBtn');
    const styleSelect = document.getElementById('styleSelect');
    const autoplayHintEl = document.getElementById('autoplayHint');

    let currentStyle = 'drum and bass';
    let currentIndex = 0;
    const styleNames = Object.keys(MUSIC_LIBRARY).filter(name => MUSIC_LIBRARY[name].length > 0);
    styleNames.forEach(style => {
      const option = document.createElement('option');
      option.value = style;
      option.textContent = style;
      styleSelect.appendChild(option);
    });
    styleSelect.value = currentStyle;

    function getCurrentList() {
      return MUSIC_LIBRARY[currentStyle] || [];
    }

    function setAutoplayHint(visible, text) {
      if (!autoplayHintEl) return;
      if (text) autoplayHintEl.textContent = text;
      autoplayHintEl.classList.toggle('show', visible);
    }

    function getTrackDisplayName(path) {
      const rawName = path.split('/').pop() || '';
      return rawName.replace(/\.[^/.]+$/, '');
    }

    function formatTime(totalSeconds) {
      if (!Number.isFinite(totalSeconds) || totalSeconds < 0) return '00:00';
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = Math.floor(totalSeconds % 60);
      return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }

    function updateTimeText() {
      timeEl.textContent = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
    }

    function updateTitleText() {
      const list = getCurrentList();
      if (list.length === 0) {
        titleEl.textContent = `当前风格（${currentStyle}）没有可播放文件`;
        return;
      }
      titleEl.textContent = `风格：${currentStyle} | ${getTrackDisplayName(list[currentIndex])}`;
    }

    function loadTrack(trackIndex) {
      const list = getCurrentList();
      if (list.length === 0) {
        audio.removeAttribute('src');
        audio.load();
        disc.classList.remove('playing');
        updateTitleText();
        updateTimeText();
        return;
      }
      currentIndex = (trackIndex + list.length) % list.length;
      audio.src = list[currentIndex];
      audio.load();
      updateTitleText();
      updateTimeText();
    }

    async function playCurrent() {
      if (!audio.src) return;
      try {
        await audio.play();
        disc.classList.add('playing');
        statusEl.textContent = '播放中';
        setAutoplayHint(false);
      } catch (err) {
        disc.classList.remove('playing');
        statusEl.textContent = '浏览器限制自动播放，请先点击页面任意位置';
        setAutoplayHint(true, '点击任何位置以开始播放...');
      }
    }

    function pauseCurrent() {
      audio.pause();
      disc.classList.remove('playing');
      statusEl.textContent = '已暂停';
    }

    function nextTrack() {
      loadTrack(currentIndex + 1);
      playCurrent();
    }

    function prevTrack() {
      loadTrack(currentIndex - 1);
      playCurrent();
    }

    styleSelect.addEventListener('change', () => {
      currentStyle = styleSelect.value;
      currentIndex = 0;
      loadTrack(0);
      playCurrent();
    });

    prevBtn.addEventListener('click', prevTrack);
    nextBtn.addEventListener('click', nextTrack);

    disc.addEventListener('click', () => {
      if (audio.paused) {
        playCurrent();
      } else {
        pauseCurrent();
      }
    });

    const unlockByGesture = () => {
      if (audio.paused) playCurrent();
    };
    document.addEventListener('click', unlockByGesture, { once: true });
    document.addEventListener('keydown', unlockByGesture, { once: true });
    document.addEventListener('touchstart', unlockByGesture, { once: true });

    audio.addEventListener('timeupdate', updateTimeText);
    audio.addEventListener('loadedmetadata', updateTimeText);
    audio.addEventListener('ended', nextTrack);
    audio.addEventListener('play', () => {
      disc.classList.add('playing');
      statusEl.textContent = '播放中';
    });
    audio.addEventListener('pause', () => {
      disc.classList.remove('playing');
      if (!audio.ended) statusEl.textContent = '已暂停';
    });
    audio.addEventListener('error', () => {
      statusEl.textContent = '当前歌曲加载失败，自动切下一首';
      nextTrack();
    });

    loadTrack(0);
    statusEl.textContent = '默认风格：drum and bass（进入页面自动播放）';
    playCurrent();
  }

  // 游戏逻辑
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  let mouseX = canvas.width / 2;
  let mouseY = canvas.height / 2;
  const player = { x: mouseX, y: mouseY, size: 15, hit: false };
  const enemies = [];
  const bullets = [];

  function spawnEnemy() {
    const x = Math.random() * canvas.width;
    const y = Math.random() * canvas.height / 2;
    enemies.push({ x, y, size: 12 });
  }

  function shootBullet(enemy) {
    const dx = player.x - enemy.x;
    const dy = player.y - enemy.y;
    const dist = Math.hypot(dx, dy);
    bullets.push({
      x: enemy.x,
      y: enemy.y,
      dx: dx / dist,
      dy: dy / dist,
      speed: 3
    });
  }

  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    mouseX = (e.clientX - rect.left) * scaleX;
    mouseY = (e.clientY - rect.top) * scaleY;
  });

  canvas.addEventListener('touchmove', e => {
    const touch = e.touches[0];
    if (!touch) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    mouseX = (touch.clientX - rect.left) * scaleX;
    mouseY = (touch.clientY - rect.top) * scaleY;
    e.preventDefault();
  }, { passive: false });

  function update() {
    player.x = mouseX;
    player.y = mouseY;
    if (Math.random() < 0.02 && enemies.length > 0) {
      const enemy = enemies[Math.floor(Math.random() * enemies.length)];
      shootBullet(enemy);
    }
    for (let b of bullets) {
      b.x += b.dx * b.speed;
      b.y += b.dy * b.speed;
      if (Math.hypot(b.x - player.x, b.y - player.y) < player.size) {
        player.hit = true;
        setTimeout(() => player.hit = false, 200);
      }
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = player.hit ? 'red' : 'blue';
    ctx.beginPath();
    ctx.moveTo(player.x, player.y - player.size);
    ctx.lineTo(player.x - player.size, player.y + player.size);
    ctx.lineTo(player.x + player.size, player.y + player.size);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = 'black';
    for (let e of enemies) {
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.fillStyle = 'orange';
    for (let b of bullets) {
      ctx.beginPath();
      ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  for (let i = 0; i < 5; i++) spawnEnemy();
  initCursorTrail();
  initMusicPlayer();
  loop();
</script>

</body>
</html>
